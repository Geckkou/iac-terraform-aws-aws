name: "CI — Validate & Plan"

# Triggered on PRs targeting main that touch infrastructure or the workflows themselves.
# Does NOT apply — only validates and previews the plan as a PR comment.
on:
  pull_request:
    branches: [main]
    paths:
      - "environments/**"
      - ".github/workflows/**"

permissions:
  id-token: write      # required for OIDC token exchange with AWS
  contents: read
  pull-requests: write # required to post plan comments on the PR

# Cancel in-progress CI runs for the same PR branch on new pushes.
concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "~1.9"
  AWS_REGION: "us-east-1"

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Validate (no AWS credentials needed: init -backend=false)
  # ──────────────────────────────────────────────────────────────────────────────
  validate:
    name: "Validate · ${{ matrix.environment }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, prod]

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: terraform-linters/setup-tflint@v4

      - name: Terraform Format Check
        working-directory: environments/${{ matrix.environment }}
        run: terraform fmt -check -recursive

      - name: Terraform Init (no backend)
        working-directory: environments/${{ matrix.environment }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: environments/${{ matrix.environment }}
        run: terraform validate

      - name: TFLint
        working-directory: environments/${{ matrix.environment }}
        run: |
          tflint --init
          tflint --format compact

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Security Scan (static analysis, no AWS credentials needed)
  #   Checkov: broad IaC security rules (CIS, NIST, SOC2)
  #   tfsec:   Terraform-specific security checks
  #   soft_fail: true → reports findings without blocking the pipeline;
  #   set to false when you want to enforce security gates.
  # ──────────────────────────────────────────────────────────────────────────────
  security:
    name: "Security · ${{ matrix.environment }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, prod]

    steps:
      - uses: actions/checkout@v4

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: environments/${{ matrix.environment }}
          framework: terraform
          soft_fail: true
          output_format: cli

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: environments/${{ matrix.environment }}
          soft_fail: true

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Plan dev
  # Requires: AWS_ROLE_ARN_DEV repo-level secret (OIDC role)
  # ──────────────────────────────────────────────────────────────────────────────
  plan-dev:
    name: "Plan · dev"
    runs-on: ubuntu-latest
    needs: [validate, security]
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false  # needed for accurate exit code capture

      - name: Terraform Init
        working-directory: environments/dev
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: environments/dev
        run: |
          set +e
          terraform plan -detailed-exitcode -out=plan.tfplan -no-color 2>&1 | tee plan_output.txt
          PLAN_EXIT=${PIPESTATUS[0]}
          set -e
          [ $PLAN_EXIT -eq 1 ] && exit 1  # real error
          echo "has_changes=$([ $PLAN_EXIT -eq 2 ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Post Plan to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('environments/dev/plan_output.txt', 'utf8');
            const max = 60000;
            const plan = raw.length > max ? raw.slice(0, max) + '\n\n...saída truncada...' : raw;
            const badge = '${{ steps.plan.outputs.has_changes }}' === 'true'
              ? '⚠️ mudanças detectadas'
              : '✅ sem mudanças';
            const body = [
              `### Terraform Plan — \`dev\` ${badge}`,
              '',
              '<details><summary>Ver plano completo</summary>',
              '',
              '```hcl',
              plan,
              '```',
              '</details>',
              '',
              `> SHA: \`${{ github.sha }}\``,
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Upload Plan Artifact
        if: steps.plan.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: plan-dev-${{ github.sha }}
          path: environments/dev/plan.tfplan
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 4 — Plan prod
  # Requires: AWS_ROLE_ARN_PROD repo-level secret (OIDC role)
  # ──────────────────────────────────────────────────────────────────────────────
  plan-prod:
    name: "Plan · prod"
    runs-on: ubuntu-latest
    needs: [validate, security]
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: environments/prod
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: environments/prod
        run: |
          set +e
          terraform plan -detailed-exitcode -out=plan.tfplan -no-color 2>&1 | tee plan_output.txt
          PLAN_EXIT=${PIPESTATUS[0]}
          set -e
          [ $PLAN_EXIT -eq 1 ] && exit 1
          echo "has_changes=$([ $PLAN_EXIT -eq 2 ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Post Plan to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('environments/prod/plan_output.txt', 'utf8');
            const max = 60000;
            const plan = raw.length > max ? raw.slice(0, max) + '\n\n...saída truncada...' : raw;
            const badge = '${{ steps.plan.outputs.has_changes }}' === 'true'
              ? '⚠️ mudanças detectadas'
              : '✅ sem mudanças';
            const body = [
              `### Terraform Plan — \`prod\` ${badge}`,
              '',
              '<details><summary>Ver plano completo</summary>',
              '',
              '```hcl',
              plan,
              '```',
              '</details>',
              '',
              `> SHA: \`${{ github.sha }}\``,
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Upload Plan Artifact
        if: steps.plan.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: plan-prod-${{ github.sha }}
          path: environments/prod/plan.tfplan
          retention-days: 7
